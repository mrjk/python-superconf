---
# https://taskfile.dev
#
# Python tools live in the Poetry env. Always invoke them via `poetry run`
# so `task …` works without activating .venv (and without relying on Task
# PATH templating, which varies by Task version).

version: '3'

vars:
  # Prefix for project Python tooling (black, pytest, isort, …)
  PY: poetry run

includes:
  docs:
    taskfile: ./docs/Taskfile.yml
    dir: ./docs
    vars:
      PY: '{{.PY}}'

tasks:

  list:
    desc: "Show available commands"
    aliases:
      - default
    silent: true
    cmds:
      - task --list-all

  # Publish and release
  # =============

  publish_pypi_test:
    desc: Publish package on test.pypi.org
    cmds:
      - poetry build
      - poetry publish -r testpypi


  publish_pypi:
    desc: Publish package on pypi.org
    cmds:
      - poetry build
      - poetry publish


  # Fix
  # =============

  fix_lint:
    desc: fix all what can be fixed
    cmds:
      - "{{.PY}} isort --profile black --overwrite-in-place $(git ls-files | grep '\\.py$')"
      - "{{.PY}} black $(git ls-files | grep '\\.py$')"
      #- "{{.PY}} pymarkdownlnt fix $( git ls-files | grep '\\.md$' )"

  test_lint:
    desc: show what can be improved
    cmds:
      - "{{.PY}} isort --check-only --profile black $(git ls-files | grep '\\.py$')"
      - "{{.PY}} black --check $(git ls-files | grep '\\.py$')"
      - "{{.PY}} pylint $(git ls-files | grep superconf | grep '\\.py$')"

  test_lint_full:
    desc: run all linting tests
    cmds:
      - task: test_lint
      - "{{.PY}} yamllint $( git ls-files | grep '\\.yml$' )"
      - "{{.PY}} pymarkdownlnt scan $( git ls-files | grep '\\.md$' )"
      - shellcheck $( git ls-files | grep '\.sh$' )

  # Tests
  # =============

  test:
    desc: Test everything
    cmds:
      # - task: test_pytest
      # - task: test_regressions
      - task: test_report
      - task: test_examples
      - task: test_lint

  test_pytest:
    desc: Test with pytest
    cmds:
      - "{{.PY}} pytest tests"

  test_examples:
    desc: Test examples
    cmds:
      - bash ./scripts/run_python_scripts.sh examples 'example[0-9]*'

  test_regressions:
    desc: Test for regressions
    cmds:
      - "{{.PY}} pytest tests/test_50_*"

  test_report:
    desc: Report tests
    cmds:
      - >
        {{.PY}} pytest tests/
        --tb no -vv -q
        --cov=superconf --cov-report term-missing
